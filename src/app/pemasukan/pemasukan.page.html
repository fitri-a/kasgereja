<ion-header>
  <ion-toolbar>

    <ion-buttons slot="start">
      <ion-back-button defaultHref="/home"></ion-back-button>
    </ion-buttons>

    <ion-title>Pemasukan</ion-title>

  </ion-toolbar>
</ion-header>

<ion-content class="ion-padding">

  <ion-item>
    <ion-label position="stacked">Nominal</ion-label>
    <ion-input type="number" [(ngModel)]="nominal"></ion-input>
  </ion-item>

  <ion-item>
    <ion-label>Kategori</ion-label>
    <ion-select [(ngModel)]="kategori">
      <ion-select-option value="Ibadah Umum">Ibadah Umum</ion-select-option>
      <ion-select-option value="Ibadah Keluarga">Ibadah Keluarga</ion-select-option>
      <ion-select-option value="Ibadah Malam">Ibadah Malam</ion-select-option>
    </ion-select>
  </ion-item>

  <ion-item>
    <ion-label>Tanggal</ion-label>
      <ion-datetime presentation="date" [(ngModel)]="tanggal"></ion-datetime>
  </ion-item>

  <ion-button expand="block" (click)="simpanPemasukan()">
    Simpan
  </ion-button>

</ion-content>
